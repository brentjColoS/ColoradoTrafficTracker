server:
    forward-headers-strategy: framework
dashboard:
    public-data-enabled: ${DASHBOARD_PUBLIC_DATA_ENABLED:false}
management:
    endpoint:
        health:
            probes:
                enabled: true
spring:
    datasource:
        hikari:
            maximum-pool-size: ${DB_POOL_MAX:12}
            minimum-idle: ${DB_POOL_MIN_IDLE:2}
            connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:30000}
api:
    rate-limit:
        requests-per-minute: ${API_RATE_LIMIT_REQUESTS_PER_MINUTE:300}
