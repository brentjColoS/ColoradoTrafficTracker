server:
    port: 8080
spring:
    datasource:
        url: ${SPRING_DATABASE_URL:jdbc:postgresql://localhost:5432/traffic}
        username: ${SPRING_DATABASE_USERNAME:traffic}
        password: ${SPRING_DATABASE_PASSWORD:traffic}
    jpa:
        hiberante:
            ddl-auto: none
        properties:
            hibernate.jdbc.time_zone: UTC