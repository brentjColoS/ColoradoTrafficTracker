server:
    port: 8080
dashboard:
    public-data-enabled: ${DASHBOARD_PUBLIC_DATA_ENABLED:false}
    provider-status-stale-after-minutes: ${DASHBOARD_PROVIDER_STATUS_STALE_AFTER_MINUTES:20}
api:
    security:
        enabled: ${API_SECURITY_ENABLED:true}
        keys: ${API_SECURITY_KEYS:dev-local-key}
    rate-limit:
        enabled: ${API_RATE_LIMIT_ENABLED:true}
        requests-per-minute: ${API_RATE_LIMIT_REQUESTS_PER_MINUTE:120}
        trust-forwarded-for: ${API_RATE_LIMIT_TRUST_FORWARDED_FOR:false}
management:
    endpoints:
        web:
            exposure:
                include: health,info,metrics
    endpoint:
        health:
            show-details: when_authorized
spring:
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/traffic}
        username: ${SPRING_DATASOURCE_USERNAME:traffic}
        password: ${SPRING_DATASOURCE_PASSWORD:traffic}
    flyway:
        enabled: true
        baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
        baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:0}
    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: none
        properties:
            hibernate.jdbc.time_zone: UTC
