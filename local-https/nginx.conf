events {}

http {
    upstream api_service {
        server api-service:8080;
    }

    upstream routes_service {
        server routes-service:8081;
    }

    upstream ingest_service {
        server ingest-service:8082;
    }

    server {
        listen 80;
        listen [::]:80;
        server_name localhost;

        return 308 https://$host$request_uri;
    }

    server {
        listen 443 ssl;
        listen [::]:443 ssl;
        server_name localhost;

        ssl_certificate /etc/nginx/certs/localhost.pem;
        ssl_certificate_key /etc/nginx/certs/localhost-key.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;

        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_http_version 1.1;

        location = / {
            return 308 /dashboard/;
        }

        location /routes/ {
            proxy_pass http://routes_service;
        }

        location /ingest/ {
            proxy_pass http://ingest_service/;
        }

        location / {
            proxy_pass http://api_service;
        }
    }
}
