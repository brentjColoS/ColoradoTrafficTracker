server:
    port: 8082

traffic:
    tomtomApiKey: ${TOMTOM_API_KEY:}
    pollSeconds: ${TRAFFIC_POLL_SECONDS:60}
    startupValidationEnabled: ${TRAFFIC_STARTUP_VALIDATION_ENABLED:true}
    mode: ${TRAFFIC_MODE:tile}
    tileZoom: ${TRAFFIC_TILE_ZOOM:10}
    tileConcurrency: ${TRAFFIC_TILE_CONCURRENCY:4}
    tileRouteBufferMeters: ${TRAFFIC_TILE_ROUTE_BUFFER_METERS:500}
    tileQuotaTargetDailyRequests: ${TRAFFIC_TILE_QUOTA_TARGET_DAILY_REQUESTS:35000}
    tileQuotaAdaptiveCapDailyRequests: ${TRAFFIC_TILE_QUOTA_ADAPTIVE_CAP_DAILY_REQUESTS:38000}
    tileQuotaHardStopDailyRequests: ${TRAFFIC_TILE_QUOTA_HARD_STOP_DAILY_REQUESTS:40000}
    mile-marker-calibration:
        enabled: ${TRAFFIC_MILE_MARKER_CALIBRATION_ENABLED:true}
        runOnStartup: ${TRAFFIC_MILE_MARKER_CALIBRATION_RUN_ON_STARTUP:true}
        lookbackHours: ${TRAFFIC_MILE_MARKER_CALIBRATION_LOOKBACK_HOURS:168}
        batchSize: ${TRAFFIC_MILE_MARKER_CALIBRATION_BATCH_SIZE:250}
    retention:
        enabled: ${TRAFFIC_RETENTION_ENABLED:true}
        days: ${TRAFFIC_RETENTION_DAYS:30}
        cleanupCron: "${TRAFFIC_RETENTION_CLEANUP_CRON:0 15 2 * * *}"
    observability:
        ingestGapMinutes: ${TRAFFIC_OBS_INGEST_GAP_MINUTES:15}
        quotaWarnPercent: ${TRAFFIC_OBS_QUOTA_WARN_PERCENT:80}
        quotaCriticalPercent: ${TRAFFIC_OBS_QUOTA_CRITICAL_PERCENT:95}
        providerNullCycleThreshold: ${TRAFFIC_OBS_PROVIDER_NULL_CYCLE_THRESHOLD:3}
        providerStaleCycleThreshold: ${TRAFFIC_OBS_PROVIDER_STALE_CYCLE_THRESHOLD:30}
    timeseries:
        enabled: ${TRAFFIC_TIMESERIES_ENABLED:true}
        createHypertables: ${TRAFFIC_TIMESERIES_CREATE_HYPERTABLES:true}
        enableCompression: ${TRAFFIC_TIMESERIES_ENABLE_COMPRESSION:true}
        createContinuousAggregates: ${TRAFFIC_TIMESERIES_CREATE_CONTINUOUS_AGGREGATES:true}
        compressionAfterDays: ${TRAFFIC_TIMESERIES_COMPRESSION_AFTER_DAYS:7}
routes:
    baseUrl: ${ROUTES_BASE_URL:http://routes-service:8081}
management:
    endpoints:
        web:
            exposure:
                include: health,info
    endpoint:
        health:
            show-details: when_authorized
logging:
    pattern:
        level: "%5p [pollId:%X{pollId:-na} corridor:%X{corridor:-na}]"
spring:
    datasource:
        url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/traffic}
        username: ${SPRING_DATASOURCE_USERNAME:traffic}
        password: ${SPRING_DATASOURCE_PASSWORD:traffic}
    flyway:
        enabled: true
        baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:true}
        baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:0}
    jpa:
        open-in-view: false
        hibernate:
            ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
        properties:
            hibernate.jdbc.time_zone: UTC
