services:
  db:
    image: timescale/timescaledb:latest-pg16
    container_name: traffic-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-traffic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-traffic}
      POSTGRES_DB: ${POSTGRES_DB:-traffic}
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:${PGHOST_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  routes-service:
    build:
      context: .
      dockerfile: routes-service/Dockerfile
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:8081:8081"
    restart: unless-stopped

  ingest-service:
    build:
      context: .
      dockerfile: ingest-service/Dockerfile
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      TRAFFIC_POLL_SECONDS: ${TRAFFIC_POLL_SECONDS:-60}
      TRAFFIC_MODE: ${TRAFFIC_MODE:-tile}
      TRAFFIC_TILE_ZOOM: ${TRAFFIC_TILE_ZOOM:-10}
      TRAFFIC_TILE_CONCURRENCY: ${TRAFFIC_TILE_CONCURRENCY:-4}
      TRAFFIC_TILE_ROUTE_BUFFER_METERS: ${TRAFFIC_TILE_ROUTE_BUFFER_METERS:-500}
      TRAFFIC_TILE_QUOTA_TARGET_DAILY_REQUESTS: ${TRAFFIC_TILE_QUOTA_TARGET_DAILY_REQUESTS:-35000}
      TRAFFIC_TILE_QUOTA_ADAPTIVE_CAP_DAILY_REQUESTS: ${TRAFFIC_TILE_QUOTA_ADAPTIVE_CAP_DAILY_REQUESTS:-38000}
      TRAFFIC_TILE_QUOTA_HARD_STOP_DAILY_REQUESTS: ${TRAFFIC_TILE_QUOTA_HARD_STOP_DAILY_REQUESTS:-40000}
      TRAFFIC_RETENTION_ENABLED: ${TRAFFIC_RETENTION_ENABLED:-true}
      TRAFFIC_RETENTION_DAYS: ${TRAFFIC_RETENTION_DAYS:-30}
      TRAFFIC_RETENTION_CLEANUP_CRON: ${TRAFFIC_RETENTION_CLEANUP_CRON:-0 15 2 * * *}
      TRAFFIC_OBS_INGEST_GAP_MINUTES: ${TRAFFIC_OBS_INGEST_GAP_MINUTES:-15}
      TRAFFIC_OBS_QUOTA_WARN_PERCENT: ${TRAFFIC_OBS_QUOTA_WARN_PERCENT:-80}
      TRAFFIC_OBS_QUOTA_CRITICAL_PERCENT: ${TRAFFIC_OBS_QUOTA_CRITICAL_PERCENT:-95}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-traffic}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-traffic}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-traffic}
      ROUTES_BASE_URL: http://routes-service:8081
    depends_on:
      - db
      - routes-service
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:8082:8082"
    restart: unless-stopped

  api-service:
    build:
      context: .
      dockerfile: api-service/Dockerfile
    environment:
      API_SECURITY_ENABLED: ${API_SECURITY_ENABLED:-true}
      API_SECURITY_KEYS: ${API_SECURITY_KEYS:-dev-local-key}
      API_RATE_LIMIT_ENABLED: ${API_RATE_LIMIT_ENABLED:-true}
      API_RATE_LIMIT_REQUESTS_PER_MINUTE: ${API_RATE_LIMIT_REQUESTS_PER_MINUTE:-120}
      API_RATE_LIMIT_TRUST_FORWARDED_FOR: ${API_RATE_LIMIT_TRUST_FORWARDED_FOR:-false}
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-}
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-traffic}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-traffic}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-traffic}
    depends_on:
      - db
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:8080:8080"
    restart: unless-stopped

  https-proxy:
    image: nginx:1.27-alpine
    profiles:
      - https
    depends_on:
      - api-service
      - routes-service
      - ingest-service
    volumes:
      - ./local-https/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./.local/https:/etc/nginx/certs:ro
    ports:
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:80:80"
      - "${HOST_BIND_ADDRESS:-127.0.0.1}:443:443"
    restart: unless-stopped

volumes:
  pgdata:
